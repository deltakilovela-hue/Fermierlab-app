name: Keep Supabase Alive

# Evita que el proyecto Free de Supabase se pause por inactividad.
# Hace un ping ligero cada 2 días (la pausa ocurre a los ~7 días sin actividad).

on:
  schedule:
    - cron: '17 12 */2 * *'   # cada 2 días, 12:17 UTC
  workflow_dispatch:           # permite correrlo manualmente desde la pestaña Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://cwdlsdsewdlvelzdnzqb.supabase.co/rest/v1/clientes?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Supabase respondió: $CODE"
          if [ "$CODE" -ge 500 ]; then exit 1; fi
